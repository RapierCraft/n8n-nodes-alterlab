name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please provide enough detail so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what went wrong.
      placeholder: "When I run the AlterLab Scrape node with render_js enabled, the workflow fails with..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Add AlterLab node to workflow
        2. Configure with URL "..." and options ...
        3. Execute workflow
        4. Observe error "..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: n8n-version
    attributes:
      label: n8n Version
      placeholder: "1.30.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: n8n-nodes-alterlab Version
      placeholder: "0.7.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 14.2, Ubuntu 22.04, Windows 11, etc."
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - n8n Community Nodes (UI)
        - npm install
        - npm link (development)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste any relevant error messages or n8n execution logs. This will be formatted as code automatically.
      render: shell

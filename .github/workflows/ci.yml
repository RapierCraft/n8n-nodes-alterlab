name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (type check)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/nodes/AlterLab/AlterLab.node.js || (echo "Missing node JS" && exit 1)
          test -f dist/credentials/AlterLabApi.credentials.js || (echo "Missing API credential" && exit 1)
          test -f dist/credentials/AlterLabOAuth2Api.credentials.js || (echo "Missing OAuth2 credential" && exit 1)
          test -f dist/nodes/AlterLab/alterlab.svg || (echo "Missing node icon" && exit 1)
          test -f dist/nodes/AlterLab/AlterLab.node.json || (echo "Missing codex metadata" && exit 1)
          echo "All required dist files present"

      - name: Package dry run
        run: npm pack --dry-run
